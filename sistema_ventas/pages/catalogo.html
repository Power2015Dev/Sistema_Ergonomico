<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo de productos ergonómicos ErgoVida.">
  <title>Catálogo | ErgoVida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/public.css">
  <link rel="stylesheet" href="../assets/css/icons.css">
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="site-logo">
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M20.5 13V7a2 2 0 0 0-2-2h-13a2 2 0 0 0-2 2v6"/>
        <path d="M3 13h18"/><path d="M7 13v6M17 13v6M5 19h14"/>
      </svg>
    </div>
    <div class="logo-text">ErgoVida</div>
  </a>
  <nav class="site-nav">
    <a href="../index.html">Inicio</a>
    <a href="catalogo.html" style="color:var(--primary);font-weight:700;">Catálogo</a>
    <a href="#">Diagnóstico</a>
    <a href="carrito.html" style="display:flex;align-items:center;gap:.4rem;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Carrito <span class="badge badge-primary" style="margin-left:.15rem;">2</span>
    </a>
    <a href="login.html" class="nav-cta">Mi Cuenta</a>
  </nav>
</header>

<main>
  <!-- CATALOG HEADER -->
  <div style="background:linear-gradient(135deg,#f0fdf9,#ecfdf5);padding:3rem 5%;border-bottom:1px solid var(--border);">
    <h1 style="font-size:2rem;font-weight:800;color:var(--secondary);">Catálogo de Productos</h1>
    <p style="color:var(--text-soft);margin-top:.3rem;">120 productos ergonómicos certificados para tu bienestar</p>
  </div>

  <div class="catalog-layout">
    <!-- SIDEBAR FILTERS -->
    <aside class="filter-sidebar">
      <h3>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Filtros
      </h3>
      <div class="filter-group">
        <label class="group-label">Categoría</label>
        <label class="filter-option"><input type="checkbox" checked> Sillas Operativas (42)</label>
        <label class="filter-option"><input type="checkbox" checked> Escritorios Regulables (28)</label>
        <label class="filter-option"><input type="checkbox"> Soportes y Brazos (19)</label>
        <label class="filter-option"><input type="checkbox"> Alfombrillas (15)</label>
        <label class="filter-option"><input type="checkbox"> Reposapiés (12)</label>
        <label class="filter-option"><input type="checkbox"> Cojines Lumbares (8)</label>
      </div>
      <div class="filter-group">
        <label class="group-label">Precio Máximo</label>
        <input type="range" id="precio-max" min="20" max="1500" value="800">
        <div class="range-val"><span>$20</span><span id="precio-val">$800</span></div>
      </div>
      <div class="filter-group">
        <label class="group-label">Disponibilidad</label>
        <label class="filter-option"><input type="checkbox" checked> En stock</label>
        <label class="filter-option"><input type="checkbox"> Pocas unidades</label>
        <label class="filter-option"><input type="checkbox"> Pre-orden</label>
      </div>
      <button class="btn btn-primary btn-block" id="btn-filtrar">Aplicar Filtros</button>
      <button class="btn btn-secondary btn-block" id="btn-limpiar" style="margin-top:.6rem;">Limpiar</button>
    </aside>

    <!-- PRODUCTS -->
    <div>
      <div class="toolbar">
        <div class="search-bar">
          <span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input type="text" id="buscar-producto" placeholder="Buscar productos...">
        </div>
        <div class="filters">
          <button class="filter-chip active">Todos</button>
          <button class="filter-chip">Sillas</button>
          <button class="filter-chip">Escritorios</button>
          <button class="filter-chip">Accesorios</button>
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:.75rem;">
          <select class="form-control" style="width:auto;padding:.5rem .85rem;font-size:.85rem;">
            <option>Más populares</option>
            <option>Precio: menor a mayor</option>
            <option>Precio: mayor a menor</option>
          </select>
          <span style="font-size:.85rem;color:var(--text-muted);">70 resultados</span>
        </div>
      </div>

      <div class="products-grid" id="products-container">
        <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);">
          <div style="font-size:2rem;margin-bottom:.5rem;">⏳</div>
          Cargando productos...
        </div>
      </div>

      <div class="pagination" id="pagination-container"></div>
    </div>
  </div>
</main>

<footer class="site-footer" style="margin-top:3rem;">
  <div class="footer-bottom" style="border-top:none;padding-top:0;">
    <span>© 2026 ErgoVida.</span>
    <a href="../index.html" style="color:#64748b;">← Inicio</a>
  </div>
</footer>

<div class="toast-container" id="toasts"></div>

<script src="../assets/js/api.js"></script>
<script>
let todosLosProductos = [];
let productosFiltrados = [];

// ── Cargar productos desde la API ──
async function cargarProductos() {
    const container = document.getElementById('products-container');
    try {
        const result = await API.getProductos();
        todosLosProductos = result.data || [];
        productosFiltrados = [...todosLosProductos];
        renderProductos(productosFiltrados);
        document.querySelector('.toolbar span[style]') && 
            (document.querySelector('[style*="resultados"]').textContent = todosLosProductos.length + ' resultados');
    } catch (err) {
        container.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:3rem;">
                <div style="font-size:2rem;margin-bottom:.5rem;">⚠️</div>
                <p style="color:var(--text-muted);">No se pudieron cargar los productos.</p>
                <p style="color:var(--text-muted);font-size:.85rem;">${err.error || 'Verifica que el servidor Flask esté corriendo.'}</p>
                <button class="btn btn-primary btn-sm" onclick="cargarProductos()" style="margin-top:1rem;">Reintentar</button>
            </div>`;
    }
}

// ── Renderizar tarjetas de producto ──
function renderProductos(productos) {
    const container = document.getElementById('products-container');
    if (productos.length === 0) {
        container.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);">
                <div style="font-size:2rem;margin-bottom:.5rem;">🔍</div>
                No se encontraron productos con esos filtros.
            </div>`;
        return;
    }

    const bgColors = ['#f1f5f9','#f8f4e8','#eef2ff','#fdf8ee','#f0fdf4'];
    container.innerHTML = productos.map((p, i) => {
        const precio = formatPrice(p.precio);
        const imgSrc = p.imagen_url || '../assets/images/silla-pro.png';
        const fallback = 'https://images.unsplash.com/photo-1541558869434-2840d308329a?w=400&q=80';
        const bg = bgColors[i % bgColors.length];
        let badge = '';
        if (p.es_destacado) badge = '<span class="product-badge-corner"><span class="badge badge-success">Destacado</span></span>';
        if (p.precio_descuento) badge = '<span class="product-badge-corner"><span class="badge badge-danger">Oferta</span></span>';
        if (p.stock === 0) badge = '<span class="product-badge-corner"><span class="badge badge-warning">Agotado</span></span>';

        return `
        <div class="product-card">
          <div class="product-img" style="background:${bg};padding:.75rem;position:relative;">
            <img src="${imgSrc}" alt="${p.nombre}"
                 style="width:100%;height:100%;object-fit:contain;"
                 onerror="this.src='${fallback}';this.style.objectFit='cover'">
            ${badge}
          </div>
          <div class="product-card-body">
            <div class="product-cat">${p.descripcion_corta || 'Ergonómico'}</div>
            <div class="product-name">${p.nombre}</div>
            <div class="product-desc">${p.descripcion_larga || p.descripcion_corta || ''}</div>
            <div class="product-footer">
              <div class="product-price">${p.precio_descuento ? '<s style="color:var(--text-muted);font-size:.8rem;">'+precio+'</s> '+formatPrice(p.precio_descuento) : precio}</div>
              <button class="btn btn-primary btn-sm" onclick='agregarAlCarrito(${JSON.stringify(p).replace(/'/g,"&#39;")})' ${p.stock === 0 ? 'disabled' : ''}>
                ${p.stock === 0 ? 'Agotado' : '🛒 Agregar'}
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
}

// ── Agregar al carrito ──
function agregarAlCarrito(producto) {
    Carrito.addItem(producto);
    showToast('success', '✓ ' + producto.nombre + ' agregado al carrito');
}

// ── Filtros y búsqueda ──
document.getElementById('buscar-producto').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    productosFiltrados = todosLosProductos.filter(p =>
        p.nombre.toLowerCase().includes(q) || 
        (p.descripcion_corta && p.descripcion_corta.toLowerCase().includes(q)) ||
        (p.sku && p.sku.toLowerCase().includes(q))
    );
    renderProductos(productosFiltrados);
});

document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
    });
});

document.getElementById('precio-max').addEventListener('input', function() {
    document.getElementById('precio-val').textContent = '$' + this.value;
});

// ── Iniciar ──
document.addEventListener('DOMContentLoaded', cargarProductos);
</script>
</body>
</html>
